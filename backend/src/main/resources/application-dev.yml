spring:
  datasource:
    url: jdbc:mysql://localhost:3306/assurance_sante_connect?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 3001
  servlet:
    context-path: /api

app:
  jwtSecret: mySecretKeyForJWTTokenGenerationAndValidation123456789
  jwtExpirationMs: 86400000

logging:
  level:
    root: INFO
    com.assurance.sante.connect: DEBUG
    org.springframework.security: DEBUG
